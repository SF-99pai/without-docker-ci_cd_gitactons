name: Backend-CI

on:
  push:
    branches: [ main, 'feature/backend', 'backend/*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then python -m pip install -r backend/requirements.txt; fi

      - name: Run tests (if any)
        run: |
          if [ -f backend/pytest.ini ] || [ -d backend/tests ]; then cd backend && pytest -q; else echo 'No backend tests found, skipping'; fi

      - name: Lint (optional)
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 backend || true; else echo 'flake8 not installed, skipping'; fi

  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          file: ./backend/Dockerfile
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:${{ github.sha }}

  deploy_server:
    name: deploy_server
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Validate deploy secrets
        run: |
          echo "Validating required secrets for deploy..."
          missing=false
          if [ -z "${{ secrets.SSH_HOST }}" ]; then echo 'Missing secret: SSH_HOST'; missing=true; fi
          if [ -z "${{ secrets.SSH_USER }}" ]; then echo 'Missing secret: SSH_USER'; missing=true; fi
          if [ -z "${{ secrets.SSH_PORT }}" ]; then echo 'Missing secret: SSH_PORT'; missing=true; fi
          if [ -z "${{ secrets.SSH_PRIVATE_KEY }}" ]; then echo 'Missing secret: SSH_PRIVATE_KEY'; missing=true; fi
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then echo 'Missing secret: DOCKERHUB_USERNAME'; missing=true; fi
          if [ "$missing" = true ]; then
            echo 'Set the missing repository secrets in Settings → Secrets and variables → Actions.'
            exit 1
          fi

      - name: Check SSH connectivity (robust)
        id: ssh_check
        env:
          SSH_HOST: ${{ secrets.SSH_HOST }}
          SSH_PORT: ${{ secrets.SSH_PORT }}
        run: |
          python - <<'PY'
          import socket, os, time
          host = os.environ.get('SSH_HOST')
          port = int(os.environ.get('SSH_PORT', '22'))
          ok = False
          resolved = []
          for attempt in range(1, 4):
              try:
                  print(f"Attempt {attempt}: resolving {host}")
                  resolved = socket.gethostbyname_ex(host)[2]
                  print("Resolved addresses:", resolved)
                  s = socket.socket()
                  s.settimeout(10)
                  print(f"Attempt {attempt}: connecting to {host}:{port}")
                  s.connect((host, port))
                  s.close()
                  ok = True
                  break
              except Exception as e:
                  print(f"Attempt {attempt}: failed: {e}")
                  time.sleep(5)
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f"ssh_open={'true' if ok else 'false'}\n")
              f.write(f"ssh_resolved={','.join(resolved)}\n")
          if not ok:
              print('SSH connectivity check failed after retries')
              exit(1)
          PY

      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Notify skipped deploy if SSH not reachable
        if: ${{ steps.ssh_check.outputs.ssh_open == 'false' }}
        run: |
          echo 'SSH host is not reachable from GitHub Actions runner. Skipping deploy step.'
          echo "Resolved addresses: ${{ steps.ssh_check.outputs.ssh_resolved }}"
          echo 'Possible causes: wrong SSH_HOST (private IP), firewall/security group blocking port, NAT without port forwarding, or SSHD down.'
          echo 'To force deployment even if connectivity appears broken, ensure network is reachable or run from a self-hosted runner in same network.'

      - name: List workspace before upload
        if: ${{ steps.ssh_check.outputs.ssh_open == 'true' }}
        run: |
          echo "GITHUB_WORKSPACE=$GITHUB_WORKSPACE"
          pwd
          ls -la || true
          ls -la docker-compose.yml || true

      - name: Upload docker-compose.yml
        if: ${{ steps.ssh_check.outputs.ssh_open == 'true' }}
        uses: appleboy/scp-action@v0.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          source: docker-compose.yml
          target: ~/

      - name: Deploy to server (SSH)
        if: ${{ steps.ssh_check.outputs.ssh_open == 'true' }}
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          port: ${{ secrets.SSH_PORT }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          timeout: 5m
          command_timeout: 30m
          script: |
            set -eux
            for i in 1 2 3; do
              if docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:latest; then break; else echo "pull backend attempt $i failed, retrying..."; sleep 5; fi
            done
            for i in 1 2 3; do
              if docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-frontend:latest; then break; else echo "pull frontend attempt $i failed, retrying..."; sleep 5; fi
            done
            if [ -f ~/docker-compose.yml ]; then
              for i in 1 2 3; do
                if docker-compose -f ~/docker-compose.yml pull; then break; else echo "docker-compose pull attempt $i failed, retrying..."; sleep 5; fi
              done
              docker-compose -f ~/docker-compose.yml up -d --remove-orphans || true
            else
              echo 'No docker-compose.yml found on server at home directory'
            fi
