name: Backend CI

on:
  push:
    branches: [ main, 'feature/backend', 'backend/*' ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/backend/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f backend/requirements.txt ]; then python -m pip install -r backend/requirements.txt; fi

      - name: Run tests (if any)
        run: |
          if [ -f backend/pytest.ini ] || [ -d backend/tests ]; then cd backend && pytest -q; else echo 'No backend tests found, skipping'; fi

      - name: Lint (optional)
        run: |
          if command -v flake8 >/dev/null 2>&1; then flake8 backend || true; else echo 'flake8 not installed, skipping'; fi
  deploy:
    name: deploy
    needs: test
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push backend image
        uses: docker/build-push-action@v4
        with:
          context: ./backend
          push: true
          file: ./backend/Dockerfile
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:${{ github.sha }}
  deploy_server:
    name: deploy_server
    needs: deploy
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Deploy to server (SSH)
        uses: appleboy/ssh-action@v0.1.8
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.SSH_PORT }}
          script: |
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-backend:latest || true
            docker pull ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-frontend:latest || true
            if [ -f ~/docker-compose.yml ]; then docker-compose -f ~/docker-compose.yml pull || true; docker-compose -f ~/docker-compose.yml up -d --remove-orphans || true; else echo 'No docker-compose.yml found on server at home directory'; fi
