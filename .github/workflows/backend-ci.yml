name: Backend CI/CD

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  test:
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Verify Python
        run: |
         python --version
         pip --version

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt

      - name: Run Tests
        run: |
          cd backend
          $output = pytest 2>&1
          $rc = $LASTEXITCODE
          Write-Host $output
          if ($output -match 'collected 0 items') {
            Write-Host 'No tests found'
            exit 0
          } elseif ($rc -ne 0) {
            Write-Error "pytest failed with exit code $rc"
            exit $rc
          } else {
            exit 0
          }

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Backend Dependencies
        run: |
          cd backend
          pip install -r requirements.txt

      - name: Verify Python Installation
        run: |
          python --version
          pip --version

      - name: Deployment Complete
        run: echo Deployment completed successfully

