name: Frontend CI

on:
  push:
    branches: [ main, 'feature/frontend', 'frontend/*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        working-directory: frontend
        run: |
          npm ci

      - name: Run tests (if any)
        working-directory: frontend
        run: |
          if npm run | grep -q test; then npm test --silent || echo 'frontend tests failed'; else echo 'No frontend tests script'; fi

      - name: Build
        working-directory: frontend
        run: |
          if npm run | grep -q build; then npm run build; else echo 'No build script'; fi
  deploy:
    name: deploy
    needs: build
    runs-on: ubuntu-latest
    if: ${{ github.ref == 'refs/heads/main' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v2

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Login to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v4
        with:
          context: ./frontend
          push: true
          file: ./frontend/Dockerfile
          tags: |
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-frontend:latest
            ${{ secrets.DOCKERHUB_USERNAME }}/ci_cd-frontend:${{ github.sha }}
